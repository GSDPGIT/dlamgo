name: Docker Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-images:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract tag name
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./go-panel-backend
          file: ./go-panel-backend/Dockerfile
          push: true
          tags: |
            gsdpgit/dlamgo-backend:latest
            gsdpgit/dlamgo-backend:${{ steps.meta.outputs.version }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./vite-frontend
          file: ./vite-frontend/Dockerfile
          push: true
          tags: |
            gsdpgit/dlamgo-frontend:latest
            gsdpgit/dlamgo-frontend:${{ steps.meta.outputs.version }}
