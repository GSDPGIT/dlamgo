name: CI Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  backend-build:
    name: Build Go Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go-panel-backend/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Tidy modules
        working-directory: ./go-panel-backend
        run: go mod tidy

      - name: Build backend
        working-directory: ./go-panel-backend
        run: go build ./...

  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vite-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./vite-frontend
        run: npm install --legacy-peer-deps

      - name: Build frontend
        working-directory: ./vite-frontend
        run: npm run build

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs:
      - backend-build
      - frontend-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./go-panel-backend
          file: ./go-panel-backend/Dockerfile
          push: false
          tags: dlamgo/backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./vite-frontend
          file: ./vite-frontend/Dockerfile
          push: false
          tags: dlamgo/frontend:ci
