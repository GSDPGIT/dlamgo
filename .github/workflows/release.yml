name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  backend-artifacts:
    name: Build Backend Artifacts
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: flux-panel-backend-linux-amd64
          - goos: linux
            goarch: arm64
            output: flux-panel-backend-linux-arm64
          - goos: windows
            goarch: amd64
            output: flux-panel-backend-windows-amd64.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Tidy modules
        working-directory: ./go-panel-backend
        run: go mod tidy

      - name: Build backend binary
        working-directory: ./go-panel-backend
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p ../release
          go build -trimpath -ldflags="-s -w" -o ../release/${{ matrix.output }} .

      - name: Package backend binary
        run: |
          mkdir -p packaged
          tar -czf packaged/${{ matrix.output }}.tar.gz -C release ${{ matrix.output }}

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.goos }}-${{ matrix.goarch }}
          path: packaged/*

  frontend-artifact:
    name: Build Frontend Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vite-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./vite-frontend
        run: npm install --legacy-peer-deps

      - name: Build frontend
        working-directory: ./vite-frontend
        run: npm run build

      - name: Package frontend dist
        run: |
          mkdir -p packaged
          tar -czf packaged/vite-frontend-dist.tar.gz -C vite-frontend dist

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: packaged/vite-frontend-dist.tar.gz

  docker-release-check:
    name: Build Docker Images For Release
    runs-on: ubuntu-latest
    needs:
      - backend-artifacts
      - frontend-artifact
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./go-panel-backend
          file: ./go-panel-backend/Dockerfile
          push: false
          tags: dlamgo/backend:release-check

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./vite-frontend
          file: ./vite-frontend/Dockerfile
          push: false
          tags: dlamgo/frontend:release-check

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - backend-artifacts
      - frontend-artifact
      - docker-release-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: backend-*
          path: release-assets
          merge-multiple: true

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: release-assets

      - name: Prepare extra release files
        run: |
          cp docker-compose.yml release-assets/
          cp .env.example release-assets/
          cp DOCKER.md release-assets/
          cp README.md release-assets/
          cp CHANGELOG.md release-assets/
          cp scripts/install-node.sh release-assets/
          if [ -f doc/发布流程建议.md ]; then cp doc/发布流程建议.md release-assets/; fi
          if [ -f doc/仓库结构说明.md ]; then cp doc/仓库结构说明.md release-assets/; fi

      - name: Generate release metadata
        env:
          CURRENT_TAG: ${{ github.ref_name }}
        run: |
          mkdir -p release-assets
          echo "${CURRENT_TAG}" > release-assets/VERSION.txt
          PREVIOUS_TAG=$(git tag --sort=-creatordate | grep '^v' | grep -vx "${CURRENT_TAG}" | head -n 1 || true)

          {
            echo "# ${CURRENT_TAG} 版本说明"
            echo
            echo "- 标签：${CURRENT_TAG}"
            echo "- 提交：${GITHUB_SHA}"
            if [ -n "${PREVIOUS_TAG}" ]; then
              echo "- 对比区间：${PREVIOUS_TAG} -> ${CURRENT_TAG}"
            else
              echo "- 对比区间：首次发布或未找到上一个标签"
            fi
            echo
            echo "## 附件说明"
            echo
            echo "- Go 后端发布二进制"
            echo "- 前端 dist 构建包"
            echo "- Docker 部署文件"
            echo "- 节点安装脚本"
            echo "- 环境变量模板"
            echo "- SHA256 校验文件"
          } > release-assets/RELEASE_NOTES.md

          {
            echo "# ${CURRENT_TAG} 变更摘要"
            echo
            if [ -n "${PREVIOUS_TAG}" ]; then
              echo "## 提交区间"
              echo
              echo "\`${PREVIOUS_TAG}..${CURRENT_TAG}\`"
              echo
              echo "## 提交记录"
              echo
              git log --pretty=format:'- %h %s' "${PREVIOUS_TAG}..HEAD"
            else
              echo "## 提交记录"
              echo
              git log --pretty=format:'- %h %s'
            fi
            echo
          } > release-assets/CHANGELOG-${CURRENT_TAG}.md

          {
            echo "# ${CURRENT_TAG}"
            echo
            echo "## 版本定位"
            echo
            echo "这是 DLAMGO 的自动发布版本。"
            echo
            echo "- 标签：${CURRENT_TAG}"
            echo "- 提交：${GITHUB_SHA}"
            if [ -n "${PREVIOUS_TAG}" ]; then
              echo "- 对比区间：${PREVIOUS_TAG} -> ${CURRENT_TAG}"
            else
              echo "- 对比区间：首次发布或未找到上一个标签"
            fi
            echo
            echo "## 快速安装"
            echo
            echo "### Docker Compose"
            echo
            echo '```bash'
            echo "cp .env.example .env"
            echo "docker compose up --build -d"
            echo '```'
            echo
            echo "### 节点接入"
            echo
            echo "请使用附件中的 \`install-node.sh\`，或在面板中生成节点安装命令。"
            echo
            echo "## 附件列表"
            echo
            echo "- 后端二进制包"
            echo "- 前端 dist 构建包"
            echo "- docker-compose.yml"
            echo "- .env.example"
            echo "- install-node.sh"
            echo "- README.md"
            echo "- DOCKER.md"
            echo "- CHANGELOG.md"
            echo "- RELEASE_NOTES.md"
            echo "- CHANGELOG-${CURRENT_TAG}.md"
            echo "- SHA256SUMS.txt"
            echo
            echo "## 变更摘要"
            echo
            if [ -n "${PREVIOUS_TAG}" ]; then
              git log --pretty=format:'- %h %s' "${PREVIOUS_TAG}..HEAD"
            else
              git log --pretty=format:'- %h %s'
            fi
            echo
          } > release-assets/RELEASE_BODY.md

      - name: Generate checksums
        working-directory: ./release-assets
        run: |
          sha256sum * > SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-assets/RELEASE_BODY.md
          files: |
            release-assets/*
