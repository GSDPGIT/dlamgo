services:
  backend:
    build:
      context: ./go-panel-backend
    container_name: flux-go-backend
    restart: unless-stopped
    environment:
      APP_ADDR: ":6365"
      DATABASE_PATH: /data/flux-panel.db
      JWT_SECRET: ${JWT_SECRET:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin_user}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    volumes:
      - sqlite_data:/data
    ports:
      - "${BACKEND_PORT:-6365}:6365"

  frontend:
    build:
      context: ./vite-frontend
    container_name: flux-vite-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-6366}:80"

volumes:
  sqlite_data:
    driver: local
